# =========================
# General
# =========================
set -g default-shell /usr/bin/zsh
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -as terminal-features ",*:sync"
set -g repeat-time 700
set -g mode-keys vi

# =========================
# Prefix
# =========================
set -g prefix C-Space
bind C-Space send-prefix

# =========================
# Reload config
# =========================
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# =========================
# Pane splitting
# =========================
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# =========================
# Pane navigation
# =========================
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R
unbind Up
unbind Down
unbind Left
unbind Right

# =========================
# Resize panes
# =========================
bind -r C-Left  resize-pane -L 1
bind -r C-Right resize-pane -R 1
bind -r C-Down  resize-pane -D 1
bind -r C-Up    resize-pane -U 1

# =========================
# Close pane
# =========================
bind -n C-x kill-pane

# =========================
# Switch windows
# =========================
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4

# =========================
# Scroll
# =========================
bind -n C-S-k if-shell -F "#{pane_in_mode}" \
    "send-keys -X -N 3 scroll-up" \
    "copy-mode -e ; send-keys -X -N 3 scroll-up"
bind -n C-S-j if-shell -F "#{pane_in_mode}" \
    "send-keys -X -N 3 scroll-down" \
    "copy-mode -e ; send-keys -X -N 3 scroll-down"

# =========================
# Copy Mode
# =========================

bind -n C-v copy-mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"


# =========================
# Tomorrow Night Theme
# =========================
# Pane borders
set -g pane-border-style          "fg=#373b41"
set -g pane-active-border-style   "fg=#81a2be"

# Status bar
set -g status-style               "bg=#282a2e,fg=#c5c8c6"
set -g status-interval            1
set -g status-justify             left
set -g status-left-length         20
set -g status-right-length        50
set -g status-left  "#[bg=#81a2be,fg=#1d1f21,bold] #S #[bg=#282a2e,fg=#81a2be,nobold]  "
set -g status-right "#[fg=#969896]%H:%M  %d %b "

# Window tabs
set -g window-status-format         "#[fg=#969896] #I:#W "
set -g window-status-current-format "#[bg=#373b41,fg=#c5c8c6,bold] #I:#W "
set -g window-status-separator      ""

# Messages / command prompt
set -g message-style         "bg=#373b41,fg=#c5c8c6"
set -g message-command-style "bg=#373b41,fg=#c5c8c6"

# Copy mode highlight
set -g mode-style "bg=#373b41,fg=#c5c8c6"
